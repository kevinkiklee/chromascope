<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    /* Theme-aware via Photoshop UXP CSS variables. The host updates these
     * automatically when the user switches between Darkest / Dark / Light /
     * Lightest themes. Hardcoded fallbacks cover the case where the variable
     * is unset (older PS versions or non-UXP test runners). */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: var(--uxp-host-background-color, #2b2b2b);
      font-family: "Adobe Clean", system-ui, sans-serif;
      color: var(--uxp-host-text-color, #b0b0b0);
      font-size: var(--uxp-host-font-size, 11px);
    }
    #chromascope-root {
      width: 100%; height: 100%;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Scope image — square, width-filling, no vertical flex growth.
     * Background stays a fixed near-black so the scope reads consistently
     * regardless of the host theme (the scope's own graticule is dark). */
    #scope-canvas-container {
      flex: none;
      width: 100%;
      aspect-ratio: 1;
      min-height: 0;
      background: #111;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #scope-image {
      max-width: 100%;
      max-height: 100%;
      display: block;
      aspect-ratio: 1;
      object-fit: contain;
    }

    /* Compact controls — fixed at bottom, no flex grow */
    #controls-container {
      flex-shrink: 0;
      padding: 3px 4px;
      background: var(--uxp-host-background-color, #2b2b2b);
      border-top: 1px solid var(--uxp-host-border-color, #3a3a3a);
    }

    .vs-control-group { margin-bottom: 1px; }
    .vs-control-group:last-child { margin-bottom: 0; }
    /* Section headings. Note: `text-transform` is silently ignored by Photoshop
     * UXP, so summaries are pre-uppercased at the source rather than via CSS. */
    .vs-control-group summary {
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      font-size: var(--uxp-host-font-size-smaller, 9px);
      letter-spacing: 0.4px;
      color: var(--uxp-host-label-text-color, #888);
      padding: 2px 0;
    }
    .vs-control-group summary:hover { color: var(--uxp-host-text-color, #bbb); }
    .vs-control-group[open] summary { margin-bottom: 2px; }

    .vs-control-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 1px;
    }
    .vs-control-row label {
      flex: 0 0 38px;
      color: var(--uxp-host-label-text-color, #888);
      font-size: var(--uxp-host-font-size-smaller, 9px);
    }

    .vs-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      flex: 1;
      background: var(--uxp-host-border-color, #3a3a3a);
      border-radius: 2px;
    }
    .vs-btn {
      flex: 1 1 28%;
      padding: 0 1px;
      border: none;
      border-radius: 0;
      background: var(--uxp-host-widget-hover-background-color, #333);
      color: var(--uxp-host-text-color-secondary, #999);
      font-size: var(--uxp-host-font-size-smaller, 9px);
      line-height: 13px;
      min-height: 0;
      height: 16px;
      text-align: center;
      cursor: pointer;
    }
    .vs-btn:hover {
      background: var(--uxp-host-widget-hover-background-color, #3e3e3e);
      color: var(--uxp-host-widget-hover-text-color, #ccc);
    }
    .vs-btn.active { background: #4a6fa5; color: #fff; }

    .vs-slider-row {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 1px;
    }
    /* Label wraps the input because UXP doesn't honor `<label for=>`. */
    .vs-slider-row label {
      display: flex;
      align-items: center;
      gap: 3px;
      flex: 1;
      color: var(--uxp-host-label-text-color, #888);
      font-size: var(--uxp-host-font-size-smaller, 9px);
    }
    .vs-slider-row label > span:first-child {
      flex: 0 0 38px;
    }
    .vs-slider-row input[type="range"] {
      flex: 1;
      height: 8px;
      accent-color: #5a8fd5;
    }
    .vs-slider-row .vs-slider-value {
      flex: 0 0 18px;
      text-align: right;
      color: var(--uxp-host-text-color-secondary, #777);
      font-size: var(--uxp-host-font-size-smaller, 8px);
      font-variant-numeric: tabular-nums;
    }

  </style>
</head>
<body>
  <div id="chromascope-root">
    <div id="scope-canvas-container">
      <canvas id="scope-canvas" style="display:none;" width="1" height="1"></canvas>
      <!-- Explicit width/height match the default scopeSize (300px) so UXP
           reserves the right amount of layout space before the first frame
           lands; without this, panels may shift on first paint. -->
      <img id="scope-image" width="300" height="300" alt="Chromascope vectorscope visualization" />
    </div>
    <div id="controls-container"></div>
  </div>
  <script src="core/scope-bundle.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
