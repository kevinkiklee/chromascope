<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body {
      width: 100%; height: 100%;
      overflow: hidden;
      background: #232323;
      font-family: "Adobe Clean", system-ui, sans-serif;
      color: #b0b0b0;
    }
    /* Right padding accounts for UXP scrollbar gutter */
    #chromascope-root {
      width: 100%; height: 100%;
      overflow: hidden;
    }

    /* Scope image fills full usable width, square aspect */
    #scope-canvas-container {
      width: 100%;
      background: #111;
      overflow: hidden;
    }
    #scope-image {
      width: 100%;
      display: block;
    }

    /* Compact controls */
    #controls-container {
      padding: 3px 4px;
      background: #2b2b2b;
      border-top: 1px solid #3a3a3a;
    }

    .vs-control-group { margin-bottom: 1px; }
    .vs-control-group:last-child { margin-bottom: 0; }
    .vs-control-group summary {
      cursor: pointer;
      user-select: none;
      font-weight: 600;
      font-size: 9px;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      color: #888;
      padding: 2px 0;
    }
    .vs-control-group summary:hover { color: #bbb; }
    .vs-control-group[open] summary { margin-bottom: 2px; }

    .vs-control-row {
      display: flex;
      align-items: center;
      gap: 4px;
      margin-bottom: 1px;
    }
    .vs-control-row label {
      flex: 0 0 38px;
      color: #888;
      font-size: 9px;
    }

    .vs-btn-group {
      display: flex;
      flex-wrap: wrap;
      gap: 1px;
      flex: 1;
      background: #3a3a3a;
      border-radius: 2px;
    }
    .vs-btn {
      flex: 1 1 28%;
      padding: 0 1px;
      border: none;
      border-radius: 0;
      background: #333;
      color: #999;
      font-size: 9px;
      line-height: 13px;
      min-height: 0;
      height: 16px;
      text-align: center;
      cursor: pointer;
    }
    .vs-btn:hover { background: #3e3e3e; color: #ccc; }
    .vs-btn.active { background: #4a6fa5; color: #fff; }

    .vs-slider-row {
      display: flex;
      align-items: center;
      gap: 3px;
      margin-bottom: 1px;
    }
    .vs-slider-row label {
      flex: 0 0 38px;
      color: #888;
      font-size: 9px;
    }
    .vs-slider-row input[type="range"] {
      flex: 1;
      height: 8px;
      accent-color: #5a8fd5;
    }
    .vs-slider-row .vs-slider-value {
      flex: 0 0 18px;
      text-align: right;
      color: #777;
      font-size: 8px;
      font-variant-numeric: tabular-nums;
    }

  </style>
</head>
<body>
  <div id="chromascope-root">
    <div id="scope-canvas-container">
      <canvas id="scope-canvas" style="display:none;" width="1" height="1"></canvas>
      <img id="scope-image" />
    </div>
    <div id="controls-container"></div>
  </div>
  <script src="core/scope-bundle.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
