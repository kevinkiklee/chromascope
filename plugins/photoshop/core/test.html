<!DOCTYPE html>
<html>
<head><meta charset="UTF-8" /></head>
<body style="margin:0;background:#1a1a1a;color:#0f0;font-family:monospace;padding:10px;font-size:12px;">
  <div id="log">Waiting for messages...</div>
  <script>
    const log = document.getElementById("log");
    function addLog(msg) {
      log.innerHTML += "<br>" + msg;
    }
    addLog("webview loaded");
    window.addEventListener("message", function(event) {
      addLog("GOT MESSAGE: type=" + (event.data && event.data.type));
      if (event.data && event.data.type === "pixels") {
        addLog("pixels: " + event.data.width + "x" + event.data.height + " data length: " + (event.data.data && event.data.data.length));
      }
    });
  </script>
</body>
</html>
