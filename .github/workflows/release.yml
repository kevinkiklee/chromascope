name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build-macos:
    name: Build (macOS)
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/processor

      - run: npm install --no-package-lock
      - run: npm run build:plugins

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-macos
          path: |
            plugins/photoshop/
            plugins/lightroom/chromascope.lrdevplugin/

  build-windows:
    name: Build (Windows)
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/processor

      - run: npm install --no-package-lock
      - run: npx turbo run build --filter=@chromascope/core
      - run: npx turbo run build --filter=@chromascope/photoshop

      - name: Build Rust processor
        run: cargo build --release --manifest-path packages/processor/Cargo.toml

      - name: Assemble Lightroom plugin
        shell: bash
        run: |
          LR_DIR="plugins/lightroom/chromascope.lrdevplugin"
          mkdir -p "$LR_DIR/core" "$LR_DIR/bin/win-x64"
          cp packages/core/build/index.html "$LR_DIR/core/index.html"
          cp packages/processor/target/release/processor.exe "$LR_DIR/bin/win-x64/processor.exe"

      - uses: actions/upload-artifact@v4
        with:
          name: plugins-windows
          path: |
            plugins/photoshop/
            plugins/lightroom/chromascope.lrdevplugin/

  release:
    name: Create Release
    needs: [build-macos, build-windows]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: plugins-macos
          path: artifacts/macos

      - uses: actions/download-artifact@v4
        with:
          name: plugins-windows
          path: artifacts/windows

      - name: Package Photoshop ZIP
        run: |
          mkdir -p dist stage
          cp -r artifacts/macos/plugins/photoshop stage/Chromascope-Photoshop
          (cd stage && zip -r ../dist/Chromascope-Photoshop.zip Chromascope-Photoshop/)

      - name: Package Lightroom macOS ZIP
        run: |
          mkdir -p stage/chromascope.lrdevplugin/bin/macos-arm64
          mkdir -p stage/chromascope.lrdevplugin/bin/macos-x64

          LR="artifacts/macos/plugins/lightroom/chromascope.lrdevplugin"
          cp "$LR"/*.lua "$LR"/README.txt stage/chromascope.lrdevplugin/
          [ -d "$LR/core" ] && cp -r "$LR/core" stage/chromascope.lrdevplugin/core
          [ -f "$LR/bin/macos-arm64/processor" ] && cp "$LR/bin/macos-arm64/processor" stage/chromascope.lrdevplugin/bin/macos-arm64/
          [ -f "$LR/bin/macos-x64/processor" ] && cp "$LR/bin/macos-x64/processor" stage/chromascope.lrdevplugin/bin/macos-x64/

          (cd stage && zip -r ../dist/Chromascope-Lightroom-macOS.zip chromascope.lrdevplugin/)
          rm -rf stage/chromascope.lrdevplugin

      - name: Package Lightroom Windows ZIP
        run: |
          mkdir -p stage/chromascope.lrdevplugin/bin/win-x64

          LR="artifacts/windows/plugins/lightroom/chromascope.lrdevplugin"
          cp "$LR"/*.lua "$LR"/README.txt stage/chromascope.lrdevplugin/
          [ -d "$LR/core" ] && cp -r "$LR/core" stage/chromascope.lrdevplugin/core
          [ -f "$LR/bin/win-x64/processor.exe" ] && cp "$LR/bin/win-x64/processor.exe" stage/chromascope.lrdevplugin/bin/win-x64/

          (cd stage && zip -r ../dist/Chromascope-Lightroom-Windows.zip chromascope.lrdevplugin/)

      - name: Generate checksums
        run: (cd dist && sha256sum *.zip > checksums.txt && cat checksums.txt)

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            dist/Chromascope-Photoshop.zip
            dist/Chromascope-Lightroom-macOS.zip
            dist/Chromascope-Lightroom-Windows.zip
            dist/checksums.txt
