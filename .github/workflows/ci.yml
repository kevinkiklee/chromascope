name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  core:
    name: Core (TypeScript)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-package-lock
      - run: npx turbo build --filter=@chromascope/core
      - run: npx turbo test --filter=@chromascope/core

  processor:
    name: Processor (Rust)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: packages/processor
      - run: cargo build --release --manifest-path packages/processor/Cargo.toml
      - run: cargo test --release --manifest-path packages/processor/Cargo.toml

  web:
    name: Web (Next.js)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm install --no-package-lock
      - run: npx turbo build --filter=@chromascope/web
