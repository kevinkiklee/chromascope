[package]
name = "processor"
version = "0.1.0"
edition = "2021"
license = "MIT"
repository = "https://github.com/chromascope/chromascope"
description = "Image decoding and vectorscope rendering CLI for Chromascope"

[[bin]]
name = "processor"
path = "src/main.rs"

[dependencies]
clap = { version = "4", features = ["derive"] }
image = { version = "0.25", default-features = false, features = ["jpeg", "tiff"] }
anyhow = "1"

[profile.release]
opt-level = 3
lto = true
codegen-units = 1
strip = true
